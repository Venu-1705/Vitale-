name: Deploy API to App Runner

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  build-and-deploy:
    name: Build → ECR → App Runner
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # Required for OIDC auth with AWS
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to AWS using GitHub OIDC — no long-lived keys needed.
      # AWS_DEPLOY_ROLE_ARN is output by `terraform output github_deploy_role_arn`.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Build the Docker image from the repo root (monorepo context).
      # The Dockerfile is at artifacts/api-server/Dockerfile.
      - name: Build and push Docker image
        env:
          ECR_REPO: ${{ vars.ECR_REPO_URI }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --file artifacts/api-server/Dockerfile \
            --tag "$ECR_REPO:$IMAGE_TAG" \
            --tag "$ECR_REPO:latest" \
            --cache-from "$ECR_REPO:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
          docker push "$ECR_REPO:$IMAGE_TAG"
          docker push "$ECR_REPO:latest"

      - name: Deploy to App Runner
        env:
          SERVICE_ARN: ${{ vars.APP_RUNNER_SERVICE_ARN }}
        run: |
          OPERATION_ID=$(aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --query 'OperationId' \
            --output text)
          echo "Deployment started. Operation ID: $OPERATION_ID"
          echo "Monitor at: https://ap-south-1.console.aws.amazon.com/apprunner/home?region=ap-south-1"
