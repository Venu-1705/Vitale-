kind = "web"
previewPath = "/coach-platform/"
title = "Vitalé Coach & Admin Platform"
version = "1.0.0"
id = "artifacts/coach-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/coach-platform/" ]
localPort = 19778

[services.development]
run = "pnpm --filter @workspace/coach-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/coach-platform", "run", "build" ]
publicDir = "artifacts/coach-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19778"
BASE_PATH = "/coach-platform/"
